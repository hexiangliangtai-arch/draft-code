<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドラフト会議風 名前発表ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section id="startScreen" class="draft-board start-screen" aria-labelledby="startTitle">
      <p class="event-label">2026 DRAFT MEETING</p>
      <h1 id="startTitle">名前発表ツール</h1>

      <div class="start-form">
        <div class="room-area">
          <label for="roomIdInput">ルームID</label>
          <input type="text" id="roomIdInput" placeholder="例：draft2026">
        </div>

        <div class="team-area">
          <label for="teamNameInput">チーム名</label>
          <input type="text" id="teamNameInput" placeholder="例：広島東洋">
        </div>

        <button id="joinRoomButton" type="button">入室する</button>
        <p id="startMessage" class="message" aria-live="polite"></p>
      </div>
    </section>

    <section id="draftScreen" class="draft-board draft-screen is-hidden" aria-labelledby="pageTitle">
      <p class="event-label">2026 DRAFT MEETING</p>
      <h1 id="pageTitle">名前発表ツール</h1>

      <div class="current-status">
        <p id="currentRoomLabel" class="current-room">現在のルーム：未入室</p>
        <p id="currentTeamLabel" class="current-team">現在のチーム：未設定</p>
        <p id="nextRoundLabel" class="next-round-label">次のあなたの指名：第1巡目</p>
      </div>

      <div class="draft-layout">
        <div class="draft-main-panel">
          <div class="input-area">
            <label for="playerName">指名したい名前</label>
            <div class="input-row">
              <input type="text" id="playerName" placeholder="例：山田 太郎">
              <button id="announceButton" type="button">指名する</button>
            </div>
            <p id="message" class="message" aria-live="polite"></p>
          </div>

          <div id="announcement" class="announcement">
            <p id="roundText" class="round-text">第1巡選択希望選手</p>
            <p id="announcementTeamName" class="team-text">チーム名を設定してください</p>
            <p id="announcedName" class="announced-name">ここに名前が表示されます</p>
          </div>
        </div>

        <aside class="draft-history-panel">
          <section class="participants-area" aria-labelledby="participantsTitle">
            <h2 id="participantsTitle">参加者一覧</h2>
            <ul id="participantsList" class="participants-list"></ul>
          </section>

          <section class="history-area" aria-labelledby="historyTitle">
            <div class="history-header">
              <h2 id="historyTitle">ドラフト履歴</h2>
              <button id="resetButton" class="reset-button" type="button">履歴をリセット</button>
            </div>

            <div class="history-tabs" role="tablist" aria-label="履歴表示の切り替え">
              <button id="overallHistoryTab" class="history-tab is-active" type="button">全体履歴</button>
              <button id="playerHistoryTab" class="history-tab" type="button">プレイヤー別</button>
            </div>

            <div id="overallHistoryPanel" class="history-panel">
              <ol id="draftHistory" class="draft-history"></ol>
            </div>

            <div id="playerHistoryPanel" class="history-panel is-hidden">
              <div id="playerHistory" class="player-history"></div>
            </div>
          </section>
        </aside>
      </div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
